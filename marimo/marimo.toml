[experimental]

[language_servers.ty]
enabled = true

[language_servers.basedpyright]
enabled = false

[language_servers.pylsp]
enable_pylint = false
enable_flake8 = false
enable_mypy = true
enable_ruff = true
enabled = true
enable_pyflakes = false
enable_pydocstyle = false

[diagnostics]
sql_linter = true

[display]
cell_output = "above"
default_table_max_columns = 50
dataframes = "rich"
reference_highlighting = false
code_editor_font_size = 16
theme = "system"
default_table_page_size = 10
default_width = "medium"

[save]
format_on_save = true
autosave = "after_delay"
autosave_delay = 1000

[ai]
inline_tooltip = false
mode = "manual"
rules = ""

[ai.custom_providers]

[ai.models]
displayed_models = []
custom_models = []

[runtime]
default_csv_encoding = "utf-8"
default_sql_output = "auto"
watcher_on_save = "lazy"
default_auto_download = []
on_cell_change = "autorun"
reactive_tests = true
auto_instantiate = false
std_stream_max_bytes = 1000000
output_max_bytes = 8000000
auto_reload = "off"

[package_management]
manager = "uv"

[datasources]

[formatting]
line_length = 79

[completion]
signature_hint_on_typing = false
copilot = false
activate_on_typing = true

[keymap]
preset = "vim"
destructive_delete = true

[keymap.overrides]

[snippets]
custom_paths = []
include_default_snippets = true

[mcp]
presets = []

[mcp.mcpServers]

[server]
browser = "default"
follow_symlink = false
