[keymap]
preset = "vim"
destructive_delete = true

[keymap.overrides]

[language_servers.basedpyright]
enabled = false

[language_servers.ty]
enabled = false

[language_servers.pylsp]
enable_pyflakes = false
enabled = true
enable_pydocstyle = false
enable_ruff = true
enable_flake8 = false
enable_mypy = true
enable_pylint = false

[datasources]

[experimental]

[server]
browser = "default"
follow_symlink = false

[runtime]
auto_instantiate = false
reactive_tests = true
std_stream_max_bytes = 1000000
default_sql_output = "auto"
auto_reload = "off"
output_max_bytes = 8000000
on_cell_change = "lazy"
default_auto_download = []
watcher_on_save = "lazy"

[formatting]
line_length = 79

[display]
reference_highlighting = false
cell_output = "above"
code_editor_font_size = 16
dataframes = "rich"
default_table_page_size = 10
theme = "system"
default_table_max_columns = 50
default_width = "medium"

[ai]
inline_tooltip = false
mode = "manual"
rules = ""

[ai.models]
custom_models = []
displayed_models = []

[snippets]
custom_paths = []
include_default_snippets = true

[diagnostics]
sql_linter = true

[completion]
copilot = false
activate_on_typing = true

[package_management]
manager = "uv"

[save]
autosave_delay = 1000
autosave = "after_delay"
format_on_save = true

[mcp]
presets = []

[mcp.mcpServers]
