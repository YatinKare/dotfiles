[username]
show_always = true
# Changed bg:red to bg:lavender for style_user and style_root
style_user = "bg:lavender fg:crust"
style_root = "bg:lavender fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"

[directory.substitutions]
